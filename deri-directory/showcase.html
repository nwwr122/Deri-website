<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DERÎ — All Business Profiles</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="wrap">
      <a href="index.html" class="brand">
        <span class="mark">DERÎ</span>
        <span class="tagline" data-i18n="tagline">Local businesses, found at your door</span>
      </a>
      <div class="header-actions">
        <div class="lang-switch">
          <button data-lang="ku" onclick="setLang('ku')">KU</button>
          <button data-lang="ar" onclick="setLang('ar')">AR</button>
          <button data-lang="en" class="active" onclick="setLang('en')">EN</button>
        </div>
        <a class="admin-link" href="admin.html" data-i18n="admin">Admin</a>
      </div>
    </div>
  </header>

  <section class="hero" style="padding-bottom:26px;">
    <div class="wrap">
      <h1 data-i18n="showcaseTitle">All business profiles</h1>
      <p class="sub" data-i18n="showcaseSub">Every business currently listed on DERÎ, in full.</p>
    </div>
  </section>

  <section class="grid-section">
    <div class="wrap">
      <div class="result-count" id="showcaseCount"></div>
      <div class="biz-grid" id="showcaseGrid"></div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="wrap" data-i18n="footer">DERÎ — a directory built from doorstep leaflets.</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
  <script src="showcase.js"></script>
</body>
</html>
