<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DERÎ — Local Business Directory</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="wrap">
      <a href="index.html" class="brand">
        <span class="mark">DERÎ</span>
        <span class="tagline" data-i18n="tagline">Local businesses, found at your door</span>
      </a>
      <div class="header-actions">
        <div class="lang-switch">
          <button data-lang="ku" onclick="setLang('ku')">کوردی</button>
          <button data-lang="ar" onclick="setLang('ar')">العربية</button>
          <button data-lang="en" class="active" onclick="setLang('en')">English</button>
        </div>
        <a class="admin-link" href="admin.html" data-i18n="admin">Admin</a>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="wrap">
      <h1 data-i18n="heroTitle">Find a good business near you</h1>
      <p class="sub" data-i18n="heroSub">DERÎ lists real local businesses — the same ones reaching your doorstep on printed leaflets. Search by name, category, or neighborhood.</p>
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="Search businesses or neighborhoods…">
      </div>
      <div class="filter-group">
        <div class="filter-label" data-i18n="areaFilterLabel">Area</div>
        <div class="city-toggle" id="cityStrip"></div>
      </div>
      <div class="filter-group">
        <div class="filter-label" data-i18n="categoryFilterLabel">Category</div>
        <div class="category-strip" id="categoryStrip"></div>
      </div>
    </div>
  </section>

  <section class="grid-section">
    <div class="wrap">
      <div class="result-count" id="resultCount"></div>
      <div class="biz-grid" id="bizGrid"></div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="wrap" data-i18n="footer">DERÎ — a directory built from doorstep leaflets.</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
